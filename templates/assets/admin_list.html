{% extends 'base.html' %}

{% block content %}

<h2>Manage Assets</h2>

<a href="{% url 'add_asset' %}"
   class="btn btn-success mb-3">

    Add Asset

</a>

<table class="table table-bordered">

<tr>

    <th>ID</th>
    <th>Name</th>
    <th>Category</th>
    <th>Action</th>

</tr>

{% for asset in assets %}

<tr>

    <td>{{ asset.item_id }}</td>

    <td>
    <a href="{% url 'asset_detail' asset.id %}">
        {{ asset.item_name }}
    </a>
</td>

    <td>{{ asset.category }}</td>

    <td>
        <a href="{% url 'edit_asset' asset.id %}"
   class="btn btn-warning btn-sm">

   Edit

</a>

        <a href="{% url 'delete_asset' asset.id %}"
           class="btn btn-danger btn-sm">

            Delete

        </a>

    </td>

</tr>

{% endfor %}

</table>

{% endblock %}
