{% extends 'base.html' %}

{% block content %}

<h2>My Complaints</h2>

<table class="table table-bordered">

<tr>
    <th>Asset</th>
    <th>Status</th>
    <th>Date</th>
</tr>

{% for complaint in complaints %}

<tr>
    <td>{{ complaint.asset }}</td>
    <td>{{ complaint.status }}</td>
    <td>{{ complaint.created_at }}</td>
</tr>

{% endfor %}

</table>

{% endblock %}
