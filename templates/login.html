{% extends 'base.html' %}

{% block guest_content %}

<div class="row justify-content-center mt-5">


<div class="col-md-5">

    <div class="card shadow-lg border-0">

        <div class="card-body p-5">

            <div class="text-center">

                <img src="/media/logo.png"
                     width="90"
                     class="mb-3">

                <h2>NTPC Bongaigaon</h2>

                <p class="text-muted">
                    Asset Management System
                </p>

            </div>

            <hr>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">
                        Employee ID
                    </label>

                    <input type="text"
                           name="employee_id"
                           class="form-control form-control-lg"
                           required>

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Password
                    </label>

                    <input type="password"
                           name="password"
                           class="form-control form-control-lg"
                           required>

                </div>

                <button type="submit"
                        class="btn btn-primary w-100 btn-lg">
                    Login
                </button>

            </form>

            <div class="text-center mt-4">

                <a href="{% url 'signup' %}">
                    Create New Account
                </a>

            </div>

        </div>

    </div>

</div>


</div>

{% endblock %}
