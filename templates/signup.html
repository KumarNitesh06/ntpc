{% extends 'base.html' %}

{% block guest_content %}

<h2>User Signup</h2>

<form method="POST">

    {% csrf_token %}

    <div class="mb-3">
        <label>Employee ID</label>
        <input type="text"
               name="employee_id"
               class="form-control">
    </div>

    <div class="mb-3">
        <label>Name</label>
        <input type="text"
               name="name"
               class="form-control">
    </div>

    <div class="mb-3">
        <label>Password</label>
        <input type="password"
               name="password"
               class="form-control">
    </div>

    <button class="btn btn-success">
        Register
    </button>

</form>

{% endblock %}
